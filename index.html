<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawn and MC Customer Flagged Monitoring System</title>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --primary: #059669;
  --primary-dark: #047857;
  --primary-light: #a7f3d0;
  --danger: #dc2626;
  --danger-light: #fecaca;
  --success: #16a34a;
  --success-light: #bbf7d0;
  --bg: #f0f9ff;
  --card-bg: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  min-height: 100vh;
  padding: 40px 20px;
  color: var(--text);
  line-height: 1.6;
}

.container { max-width: 1200px; margin: 0 auto; }

/* Header */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeInDown 0.8s ease-out;
}

.header h1 {
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 10px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

.header p { color: var(--text-secondary); font-size: 1.1rem; }

/* Search Section */
.search-section {
  background: var(--card-bg);
  padding: 30px;
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 30px;
  animation: fadeInUp 0.8s ease-out 0.2s both;
}

.search-wrapper {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  align-items: center;
}

.input-group {
  position: relative;
  flex: 1;
  max-width: 400px;
}

.input-group input {
  width: 100%;
  padding: 15px 20px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background: var(--bg);
}

.input-group input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
  background: white;
}

.input-group label {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  pointer-events: none;
  transition: all 0.3s ease;
  background: var(--bg);
  padding: 0 5px;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
  top: 0;
  font-size: 0.85rem;
  color: var(--primary);
  background: white;
}

.btn {
  padding: 15px 30px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 4px 14px rgba(5, 150, 105, 0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(5, 150, 105, 0.6);
}

.btn-secondary {
  background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
  color: white;
  box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
}

.btn-secondary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  animation: fadeIn 0.5s ease;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid var(--primary-light);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

/* Stats Bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
  animation: fadeInUp 0.8s ease-out;
}

.stat-card {
  background: var(--card-bg);
  padding: 20px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  text-align: center;
  border-left: 4px solid var(--primary);
}

.stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 5px;
}

.stat-label {
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Cards */
.results-grid {
  display: grid;
  gap: 20px;
  animation: fadeInUp 0.8s ease-out;
}

.card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 25px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  border: 1px solid var(--border);
  animation: fadeInUp 0.6s ease-out;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid var(--border);
}

.card-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--primary-dark);
}

.card-body {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.data-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  background: var(--bg);
  border-radius: 10px;
  transition: all 0.2s ease;
}

.data-row:hover {
  background: #e0f2fe;
  transform: translateX(5px);
}

.data-label {
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.data-value {
  font-weight: 700;
  color: var(--text);
  text-align: right;
}

/* Status Badges */
.status-badge {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.status-high {
  background: var(--danger-light);
  color: var(--danger);
  border: 2px solid var(--danger);
}

.status-high::before { content: "⚠"; }

.status-normal {
  background: var(--success-light);
  color: var(--success);
  border: 2px solid var(--success);
}

.status-normal::before { content: "✓"; }

/* Charts */
.chart-container {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 30px;
  margin-top: 30px;
  box-shadow: var(--shadow);
  animation: fadeInUp 0.8s ease-out;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.chart-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
}

.chart-wrapper {
  position: relative;
  height: 400px;
}

/* Not Found */
.notfound {
  background: var(--danger-light);
  color: var(--danger);
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  font-weight: 700;
  font-size: 1.2rem;
  border: 2px solid var(--danger);
  animation: shake 0.5s ease-in-out;
}

.notfound-icon {
  font-size: 3rem;
  margin-bottom: 10px;
}

/* Document Link */
.doc-link {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s ease;
}

.doc-link:hover {
  color: var(--primary-dark);
  text-decoration: underline;
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 1.75rem; }
  .search-wrapper { flex-direction: column; width: 100%; }
  .input-group { max-width: 100%; width: 100%; }
  .btn { width: 100%; justify-content: center; }
  .card-body { grid-template-columns: 1fr; }
}
</style>
<base target="_blank">
</head>

<body>

<div class="container">
  <div class="header">
    <h1>🏦 Pawn and MC Customer Flagged Monitoring System</h1>
    <p>Secure Transaction Monitoring & Risk Assessment Platform</p>
  </div>

  <div class="search-section">
    <div class="search-wrapper">
      <div class="input-group">
        <input type="text" id="customerId" placeholder=" " required>
        <label for="customerId">Enter Customer ID</label>
      </div>
      <button class="btn btn-primary" onclick="searchCustomer()">
        <span>🔍</span> Search Customer
      </button>
      <button class="btn btn-secondary" onclick="exportToExcel()">
        <span>📥</span> Export to Excel
      </button>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCsh3e73oOly4-F0qhDsZVyWfIIrBNGCMkxz2uJ0FkKkYMJeRIjCSgg_aClQTAK0K3/exec";
let globalData = [];

function formatValue(key, value){
  if(!value) return "<span style='color:#94a3b8'>—</span>";
  if(key === "Amount") return Number(value).toLocaleString('en-PH',{style:'currency',currency:'PHP'});
  if(key === "Total Transaction") return Number(value).toLocaleString('en-PH');
  if(key === "Date of Alert") {
    const d = new Date(value);
    if(!isNaN(d)) return d.toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});
  }
  if(key === "Document Link" && value) return `<a href="${value}" target="_blank" class="doc-link">📄 Open Document →</a>`;
  return value;
}

function generateMonthlySummary(data){
  const summary = {};
  data.forEach(row=>{
    const date = new Date(row["Date of Alert"]);
    const amount = parseFloat(row["Amount"]) || 0;
    if(isNaN(date)) return;
    const year = date.getFullYear();
    const month = date.getMonth();
    if(!summary[year]) summary[year] = Array(12).fill(0).map(()=>({count:0,total:0}));
    summary[year][month].count++;
    summary[year][month].total += amount;
  });
  return summary;
}

function calculateStats(data) {
  const totalAmount = data.reduce((sum, row) => sum + (parseFloat(row["Amount"]) || 0), 0);
  const highRiskCount = data.filter(row => row["Status"]?.toLowerCase() === "high").length;
  const normalCount = data.filter(row => row["Status"]?.toLowerCase() === "normal").length;
  return { totalRecords: data.length, totalAmount, highRisk: highRiskCount, normal: normalCount };
}

function renderStats(stats) {
  return `
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-value">${stats.totalRecords}</div>
        <div class="stat-label">Total Records</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${stats.totalAmount.toLocaleString('en-PH',{style:'currency',currency:'PHP',maximumFractionDigits:0})}</div>
        <div class="stat-label">Total Amount</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: var(--danger)">${stats.highRisk}</div>
        <div class="stat-label">High Risk</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: var(--success)">${stats.normal}</div>
        <div class="stat-label">Normal</div>
      </div>
    </div>
  `;
}

function renderResults(data){
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";
  if(!data || data.length === 0){
    resultsDiv.innerHTML = `<div class="notfound"><div class="notfound-icon">🔍</div><div>No records found for this Customer ID</div></div>`;
    return;
  }
  const stats = calculateStats(data);
  resultsDiv.innerHTML += renderStats(stats);
  const grid = document.createElement("div");
  grid.className = "results-grid";
  data.forEach((row, index)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${index * 0.1}s`;
    const statusClass = row["Status"]?.toLowerCase() === "high" ? "status-high" : "status-normal";
    const statusText = row["Status"] || "Unknown";
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">Record #${index + 1}</div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="card-body">
    `;
    Object.entries(row).forEach(([k,v])=>{
      if(k === "Status") return;
      const formattedValue = formatValue(k, v);
      card.querySelector('.card-body').innerHTML += `
        <div class="data-row">
          <span class="data-label">${k}</span>
          <span class="data-value">${formattedValue}</span>
        </div>
      `;
    });
    card.innerHTML += `</div>`;
    grid.appendChild(card);
  });
  resultsDiv.appendChild(grid);
}

function renderCharts(summary){
  const resultsDiv = document.getElementById("results");
  Object.keys(summary).forEach((year, index)=>{
    const container = document.createElement("div");
    container.className="chart-container";
    container.style.animationDelay = `${index * 0.2}s`;
    container.innerHTML = `
      <div class="chart-header">
        <div class="chart-title">📊 Monthly Alerts & Amounts - ${year}</div>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart-${year}"></canvas>
      </div>
    `;
    resultsDiv.appendChild(container);
    const ctx = document.getElementById(`chart-${year}`).getContext('2d');
    new Chart(ctx,{
      type:'bar',
      data:{
        labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
        datasets:[
          { label:'Alert Count', data: summary[year].map(m=>m.count), backgroundColor:'#059669', borderRadius: 6, borderSkipped: false },
          { label:'Total Amount (PHP)', data: summary[year].map(m=>m.total), backgroundColor:'#064e3b', borderRadius: 6, borderSkipped: false }
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio: false,
        plugins:{ 
          legend:{ position:'top', labels: { usePointStyle: true, padding: 20, font: { size: 12, weight: '600' } } },
          tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 12, cornerRadius: 8, titleFont: { size: 14, weight: 'bold' }, bodyFont: { size: 13 } }
        },
        scales:{ y:{ beginAtZero:true, ticks:{precision:0}, grid: { color: '#e2e8f0' } }, x: { grid: { display: false } } },
        animation: { duration: 1500, easing: 'easeOutQuart' }
      }
    });
  });
}

async function searchCustomer(){
  const id = document.getElementById("customerId").value.trim();
  if(!id) return alert("⚠️ Please enter a Customer ID");
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading customer data...</p></div>`;
  try{
    const res = await fetch(`${WEB_APP_URL}?customerId=${encodeURIComponent(id)}`);
    const response = await res.json();
    if(!response.success || response.data.length === 0){
      resultsDiv.innerHTML = `<div class="notfound"><div class="notfound-icon">🔍</div><div>No records found for this Customer ID</div></div>`;
      return;
    }
    globalData = response.data;
    renderResults(globalData);
    const summary = generateMonthlySummary(globalData);
    renderCharts(summary);
  }catch(err){
    console.error(err);
    resultsDiv.innerHTML = `<div class="notfound"><div class="notfound-icon">⚠️</div><div>Error fetching data. Please try again.</div></div>`;
  }
}

function exportToExcel(){
  if(!globalData || globalData.length===0){ alert("⚠️ No data available to export."); return; }
  const ws_data = [];
  ws_data.push(Object.keys(globalData[0]));
  globalData.forEach(row=>{ ws_data.push(Object.values(row)); });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  const headerStyle = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "059669" } }, alignment: { horizontal: "center" } };
  for(let i = 0; i < ws_data[0].length; i++) {
    const cellRef = XLSX.utils.encode_cell({r: 0, c: i});
    if(!ws[cellRef]) ws[cellRef] = {};
    ws[cellRef].s = headerStyle;
  }
  ws['!cols'] = ws_data[0].map(() => ({ wch: 20 }));
  XLSX.utils.book_append_sheet(wb, ws, "Customer Data");
  XLSX.writeFile(wb, `Pawn_MC_Customer_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
}

document.getElementById('customerId').addEventListener('keypress', function(e) { if(e.key === 'Enter') searchCustomer(); });
</script>

</body>
</html>
